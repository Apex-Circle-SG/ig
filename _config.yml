title: InsightGinie Archive
description: Article mirror of insightginie.com
tagline: News of Tomorrow
locale: en_US

url: "https://github.insightginie.com"
baseurl: ""

markdown: kramdown

sass:
  sass_dir: assets/css
  style: compressed

permalink: /:slug/

collections:
  posts:
    output: true

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate-v2
  - jekyll-category-pages

pagination:
  enabled: true
  per_page: 100
  permalink: '/page/:num/'
  title: ':title - Page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

# Nested Categories Configuration (Working 2026 Standard)
category_path: ''
category_layout: category
category_title_prefix: ''
