<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InsightGinie Archive</title>
    <meta name="description" content="News of Tomorrow">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <link rel="canonical" href="https://aloycwl.github.io/ig/">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="InsightGinie Archive">
    <meta property="og:title" content="InsightGinie Archive">
    <meta property="og:description" content="News of Tomorrow">
    <meta property="og:image" content="https://picsum.photos/id/695/1200/630">
    <meta property="og:url" content="https://aloycwl.github.io/ig/">

    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="https://fastly.picsum.photos/id/695/64/64.jpg?hmac=9e78jBXMmSJ38MUvNXDQKWoN0KrAVf9CwfYXlYVxY2s">

    <script type="application/ld+json" id="jsonld-site">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "InsightGinie Archive",
      "url": "https://aloycwl.github.io/ig/",
      "description": "News of Tomorrow"
    }
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MZSFSG62B8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MZSFSG62B8');
    </script>
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
<div id="site-header"></div>
<main class="container" id="main-content">
    <div id="loading">Loading...</div>
    <div id="content"></div>
    <div id="pagination" class="pagination"></div>
</main>
<div id="site-footer"></div>

<script>
let currentPage = 1;
let totalPages = 1;
let base = '';
const DEFAULT_IMAGE = 'https://picsum.photos/id/695/1200/630';

document.addEventListener('DOMContentLoaded', init);

async function init() {
    base = window.location.pathname.split('/').slice(0, -1).join('/');
    const manifest = await fetch(base + '/manifest.json').then(r => r.json());
    totalPages = manifest.latest_page;
    const params = new URLSearchParams(window.location.search);
    const urlPage = Number(params.get('page'));
    currentPage = Number.isFinite(urlPage) && urlPage >= 1 ? Math.min(urlPage, totalPages) : totalPages;

    const redirectedPath = params.get('route');
    if (redirectedPath) {
        history.replaceState(null, '', base + '/' + redirectedPath.replace(/^\/+/, ''));
    }

    const [header, footer] = await Promise.all([
        fetch(base + '/templates/header.html').then(r => r.text()),
        fetch(base + '/templates/footer.html').then(r => r.text())
    ]);
    document.getElementById('site-header').innerHTML = header;
    document.getElementById('site-footer').innerHTML = footer;

    window.addEventListener('popstate', handleRoute);
    handleRoute();
    document.getElementById('loading').style.display = 'none';
}

function normalizePath() {
    let path = window.location.pathname;
    if (path.startsWith(base)) path = path.slice(base.length);
    while (path.startsWith('/')) path = path.slice(1);
    while (path.endsWith('/')) path = path.slice(0, -1);
    return path;
}

async function handleRoute() {
    const path = normalizePath();
    if (!path || path === 'index.html') return renderPage(currentPage);
    return renderPost(path);
}

async function renderPage(pageNum) {
    currentPage = pageNum;
    const postsMap = await fetch(base + `/page/${pageNum}.json`).then(r => r.json());

    document.title = 'InsightGinie Archive';
    document.querySelector('meta[name="description"]').content = 'News of Tomorrow';

    let html = '<ul class="post-list">';
    for (const [slug, post] of Object.entries(postsMap)) {
        html += `<li class="post-item"><a onclick="navigate('${slug}'); return false;" class="post-title">${post.title}</a><span class="post-date">${post.date}</span><div>${post.excerpt || ''}</div></li>`;
    }
    html += '</ul>';
    document.getElementById('content').innerHTML = html;

    let phtml = '';
    if (currentPage > 1) phtml += `<button onclick="renderPage(${currentPage-1})">&laquo; Previous</button>`;
    phtml += `<span>Page ${currentPage} / ${totalPages}</span>`;
    if (currentPage < totalPages) phtml += `<button onclick="renderPage(${currentPage+1})">Next &raquo;</button>`;
    document.getElementById('pagination').innerHTML = phtml;
}

async function renderPost(slug) {
    slug = decodeURIComponent((slug || '').replace(/^\/+|\/+$/g, ''));
    const post = await fetch(base + `/data/${slug}.json`).then(r => r.json());

    document.title = post.title + ' | InsightGinie Archive';
    document.querySelector('meta[name="description"]').content = post.excerpt || 'News of Tomorrow';

    document.getElementById('content').innerHTML = `
        <h1>${post.title}</h1>
        <p style="color:#718096; font-size:0.9rem;">${post.date}</p>
        <img src="${post.img || DEFAULT_IMAGE}" style="width:100%; margin: 1rem 0; border-radius: 4px;" alt="">
        ${post.content}
    `;
    document.getElementById('pagination').innerHTML = `<button onclick="navigate(''); return false;">&laquo; Back to archive</button>`;
}

</body>
</html>
