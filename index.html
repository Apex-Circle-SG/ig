<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InsightGinie</title>
    <meta name="description" content="News of Tomorrow">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="InsightGinie Archive">
    <meta property="og:title" content="InsightGinie Archive">
    <meta property="og:description" content="News of Tomorrow">
    <meta property="og:image" content="https://picsum.photos/id/695/1200/630">
    <meta property="og:url" content="">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="InsightGinie Archive">
    <meta name="twitter:description" content="News of Tomorrow">
    <meta name="twitter:image" content="https://picsum.photos/id/695/1200/630">

    <link rel="icon" type="image/png" href="https://fastly.picsum.photos/id/695/64/64.jpg?hmac=9e78jBXMmSJ38MUvNXDQKWoN0KrAVf9CwfYXlYVxY2s">
    <style>
        :root { color-scheme: light; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #111; background: #fff; }
        .container { max-width: 960px; margin: 0 auto; padding: 1rem; }
        header { border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
        header a { color: #111; text-decoration: none; font-weight: 600; font-size: 1.25rem; }
        img { max-width: 100%; height: auto; border-radius: 4px; }
        a { color: #0b57d0; text-decoration: none; cursor: pointer; }
        a:hover { text-decoration: underline; }
        .post-list { list-style: none; padding: 0; }
        .post-item { padding: 0.75rem 0; border-bottom: 1px solid #f5f5f5; }
        .post-title { font-size: 1.1rem; font-weight: 500; }
        .post-date { font-size: 0.85rem; color: #718096; margin-top: 0.25rem; display: block; }
        .pagination { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; padding: 1rem; }
        .pagination button { padding: 0.5rem 1rem; border-radius: 4px; background: #edf2f7; color: #2d3748; border: none; cursor: pointer; }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
        .footer { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #eee; text-align: center; color: #718096; font-size: 0.9rem; }
        #loading { text-align: center; padding: 2rem; }
    </style>
</head>
<body>
<div id="site-header"></div>
<div class="container">
    <div id="loading">Loading...</div>
    <div id="content"></div>
    <div id="pagination" class="pagination"></div>
</div>
<div id="site-footer"></div>

<script>
let allPosts = [];
let currentPage = 1;
let totalPages = 1;
let base = '';
const POSTS_PER_PAGE = 100;

document.addEventListener('DOMContentLoaded', init);

async function init() {
    base = window.location.pathname.split('/').slice(0, -1).join('/');
    allPosts = await fetch(base + '/posts.json').then(r => r.json());
    totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
    currentPage = totalPages; // Always start on newest page

    const [header, footer] = await Promise.all([
        fetch(base + '/templates/header.html').then(r => r.text()),
        fetch(base + '/templates/footer.html').then(r => r.text())
    ]);
    document.getElementById('site-header').innerHTML = header;
    document.getElementById('site-footer').innerHTML = footer;

    window.addEventListener('popstate', handleRoute);
    handleRoute();
    document.getElementById('loading').style.display = 'none';
}

async function handleRoute() {
    let path = window.location.pathname;
    // Remove base path prefix if present
    if (path.startsWith(base)) {
        path = path.slice(base.length);
    }
    // Remove leading slashes
    while (path.startsWith('/')) {
        path = path.slice(1);
    }

    if (!path || path === 'index.html') {
        renderPage(currentPage);
    } else {
        renderPost(path);
    }
}

async function renderPage(pageNum) {
    currentPage = pageNum;
    const posts = await fetch(base + `/data/${pageNum}.json`).then(r => r.json());
    
    // Reset meta tags to site defaults
    document.title = 'InsightGinie Archive';
    document.querySelector('meta[name="description"]').content = 'News of Tomorrow';
    
    document.querySelector('meta[property="og:title"]').content = 'InsightGinie Archive';
    document.querySelector('meta[property="og:description"]').content = 'News of Tomorrow';
    document.querySelector('meta[property="og:image"]').content = 'https://picsum.photos/id/695/1200/630';
    document.querySelector('meta[property="og:url"]').content = window.location.origin + base + '/';

    let html = '<h1>InsightGinie Archive</h1><p style="color:#718096;">News of Tomorrow</p><ul class="post-list">';

    for (const post of posts) {
        html += `<li class="post-item">
            <a onclick="navigate('${post.slug}'); return false;" class="post-title">${post.title}</a>
            <span class="post-date">${post.date.slice(0,10)}</span>
        </li>`;
    }

    html += '</ul>';
    document.getElementById('content').innerHTML = html;

    let phtml = '';
    if (currentPage > 1) phtml += `<button onclick="renderPage(${currentPage-1})">&laquo; Previous</button>`;
    phtml += `<span>Page ${currentPage} / ${totalPages}</span>`;
    if (currentPage < totalPages) phtml += `<button onclick="renderPage(${currentPage+1})">Next &raquo;</button>`;
    document.getElementById('pagination').innerHTML = phtml;
}

async function renderPost(slug) {
    const postMeta = allPosts.find(p => p.slug === slug);
    if (!postMeta) { renderPage(totalPages); return; }

    // Load full post from bucket storage
    let post;
    // First check pending bucket
    try {
        const pendingRes = await fetch(base + '/data/pending/current.json');
        if (pendingRes.ok) {
        const pending = await pendingRes.json();
        post = pending.posts.find(p => p.slug === slug);
        }
    } catch(e) {
        console.warn('Pending bucket fetch failed, proceeding to sealed buckets:', e);
    }
    
    // If not found in pending check sealed buckets
    if (!post) {
        for (let i = 1; i <= totalPages; i++) {
            try {
                const bucketRes = await fetch(base + `/data/${i}.json.full`);
                if (bucketRes.ok) {
                    const bucket = await bucketRes.json();
                    post = bucket.posts.find(p => p.slug === slug);
                    if (post) break;
                }
            } catch(e) {
                console.warn(`Bucket ${i} fetch failed:`, e);
            }
        }
    }

    // Do NOT fallback to truncated excerpt - show error if full content unavailable
    if (!post) {
        console.error(`Full content for post "${slug}" not found`);
        document.getElementById('content').innerHTML = `
            <h1>${postMeta.title}</h1>
            <p style="color:#718096; font-size:0.9rem;">${postMeta.date.slice(0,10)}</p>
            <div style="background: #fff3cd; border: 1px solid #ffeaa7; padding: 1rem; border-radius: 4px; margin: 2rem 0;">
                <strong>Loading Error:</strong> Full post content is temporarily unavailable. Please try again later.
            </div>
        `;
        document.getElementById('pagination').innerHTML = `<button onclick="navigate(''); return false;">&laquo; Back to archive</button>`;
        return;
    }

    // Update document title and meta tags
    document.title = post.title + ' | InsightGinie Archive';
    document.querySelector('meta[name="description"]').content = post.description;
    
    // Update Open Graph meta tags
    let ogTitle = document.querySelector('meta[property="og:title"]');
    let ogDesc = document.querySelector('meta[property="og:description"]');
    let ogImage = document.querySelector('meta[property="og:image"]');
    let ogUrl = document.querySelector('meta[property="og:url"]');
    
    if (ogTitle) ogTitle.content = post.title;
    if (ogDesc) ogDesc.content = post.description;
    if (ogImage) ogImage.content = `https://picsum.photos/id/${post.id}/1200/630`;
    if (ogUrl) ogUrl.content = window.location.href;

    // Update Twitter Card meta tags
    let twTitle = document.querySelector('meta[name="twitter:title"]');
    let twDesc = document.querySelector('meta[name="twitter:description"]');
    let twImage = document.querySelector('meta[name="twitter:image"]');
    
    if (twTitle) twTitle.content = post.title;
    if (twDesc) twDesc.content = post.description;
    if (twImage) twImage.content = `https://picsum.photos/id/${post.id}/1200/630`;

    // Render post
    document.getElementById('content').innerHTML = `
        <h1>${post.title}</h1>
        <p style="color:#718096; font-size:0.9rem;">${post.date.slice(0,10)}</p>
        <img src="https://picsum.photos/id/${post.id}/960/500" style="width:100%; margin: 1rem 0; border-radius: 4px;" alt="">
        ${post.content}
    `;
    document.getElementById('pagination').innerHTML = `<button onclick="navigate(''); return false;">&laquo; Back to archive</button>`;
}

function navigate(slug) {
    const url = slug ? base + '/' + slug : base + '/';
    history.pushState(null, '', url);
    handleRoute();
}
</script>
</body>
</html>
