---
layout: default
---

<h1>{{ page.title | capitalize }}</h1>

{% if page.children.size > 0 %}
<h3>Subcategories:</h3>
<ul>
{% for child in page.children %}
    <li>
        <a href="{{ child.url | relative_url }}">
            {{ child.title | capitalize }}
        </a>
    </li>
{% endfor %}
</ul>
{% endif %}

<hr>

<h3>Articles:</h3>
<ul>
{% for post in page.posts %}
    <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
{% endfor %}
</ul>
