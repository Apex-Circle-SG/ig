---
layout: default
---

<h1>{{ page.title }}</h1>

<ul>

    {% assign current_main = site.data.categories | where: "slug", page.category | first %}

    {% for sub in current_main.subcategories %}
    <li>
        <a href="{{ '/' | append: page.category | append: '/' | append: sub.slug | append: '/' | relative_url }}">
            {{ sub.name }}
        </a>
    </li>
    {% endfor %}

</ul>
